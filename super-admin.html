<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슈퍼 관리자 — Dreammaker PG</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; padding: 24px; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  h1 { font-size: 28px; color: #f5d97a; }
  .logout-btn { padding: 10px 18px; background: #2a2a2a; color: #aaa; border: none; border-radius: 8px; cursor: pointer; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 18px; font-weight: 700; color: #f5d97a; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
  input { width: 100%; padding: 12px; background: #0f0f0f; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 15px; }
  input:focus { outline: none; border-color: #d4af37; }
  .btn { padding: 14px 24px; background: linear-gradient(135deg, #d4af37, #f5d97a); color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 15px; margin-top: 16px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2a2a; font-size: 14px; }
  th { color: #888; font-weight: 700; }
  .qr-link { color: #d4af37; text-decoration: none; word-break: break-all; }
  .copy-btn { padding: 4px 10px; background: #333; color: #ccc; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .auth-loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #d4af37; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .info-box { background: #2a1f0a; border: 1px solid #d4af37; padding: 16px; border-radius: 10px; font-size: 14px; line-height: 1.7; color: #ddd; margin-bottom: 20px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat { background: #1a1a1a; padding: 20px; border-radius: 12px; }
  .stat .label { font-size: 13px; color: #888; }
  .stat .value { font-size: 28px; font-weight: 800; color: #f5d97a; margin-top: 6px; }
</style>
</head>
<body>

<div id="auth-loading" class="auth-loading">
  <div class="spinner"></div>
  <div>인증 확인 중...</div>
</div>

<div class="container" id="app" style="display:none;">
  <div class="header">
    <h1>🛡️ 슈퍼 관리자 — Dreammaker PG</h1>
    <button class="logout-btn" id="logoutBtn">로그아웃</button>
  </div>

  <div class="info-box">
    💡 이 페이지는 PG 운영자(=사장님) 전용입니다.<br>
    여기서 새 매장을 등록하고, 매장 사장님 계정을 발급할 수 있습니다.
  </div>

  <div class="stats">
    <div class="stat"><div class="label">전체 매장</div><div class="value" id="stat-stores">-</div></div>
    <div class="stat"><div class="label">전체 손님</div><div class="value" id="stat-customers">-</div></div>
    <div class="stat"><div class="label">오늘 가입</div><div class="value" id="stat-today">-</div></div>
  </div>

  <div class="card">
    <div class="card-title">➕ 새 매장 등록 + 사장님 계정 한 번에 발급</div>
    <div class="form-grid">
      <div>
        <label>매장 ID (영문/숫자/하이픈)</label>
        <input type="text" id="new-store-id" placeholder="예: dreammaker001">
      </div>
      <div>
        <label>매장 이름</label>
        <input type="text" id="new-store-name" placeholder="예: ○○노래주점">
      </div>
      <div>
        <label>사장님 아이디 (로그인용)</label>
        <input type="text" id="new-owner-id" placeholder="예: nagasu">
      </div>
      <div>
        <label>비밀번호 (4자리 숫자)</label>
        <input type="text" id="new-owner-password" placeholder="예: 1234" inputmode="numeric" pattern="[0-9]*" maxlength="4">
      </div>
      <div>
        <label>주소 (선택)</label>
        <input type="text" id="new-store-address" placeholder="예: 서울시 강남구...">
      </div>
      <div>
        <label>사장님 연락처 (선택)</label>
        <input type="text" id="new-store-phone" placeholder="예: 010-1234-5678">
      </div>
    </div>
    <button class="btn" id="addStoreBtn">🎯 매장 + 계정 한 번에 등록</button>
    <div id="addStoreMsg" style="margin-top:12px;font-size:14px;"></div>
  </div>

  <div class="card">
    <div class="card-title">📋 등록된 매장 목록</div>
    <table>
      <thead><tr><th>매장 ID</th><th>이름</th><th>큐알 URL</th><th>관리</th></tr></thead>
      <tbody id="storesTable"></tbody>
    </table>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged, signOut, createUserWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { doc, getDoc, setDoc, collection, getDocs, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  let CURRENT_USER = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = '/login.html'; return; }
    const ownerDoc = await getDoc(doc(db, 'shop_owners', user.uid));
    if (!ownerDoc.exists() || ownerDoc.data().role !== 'super_admin') {
      alert('슈퍼 관리자 권한이 없습니다.');
      await signOut(auth);
      window.location.href = '/login.html';
      return;
    }
    CURRENT_USER = user;
    document.getElementById('auth-loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadStores();
  });

  async function loadStores() {
    const storesSnap = await getDocs(collection(db, 'stores'));
    const stores = [];
    let totalCustomers = 0;
    let todayCount = 0;
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);

    for (const storeDoc of storesSnap.docs) {
      const storeData = { id: storeDoc.id, ...storeDoc.data() };
      const custSnap = await getDocs(collection(db, 'stores', storeDoc.id, 'customers'));
      storeData.customerCount = custSnap.size;
      totalCustomers += custSnap.size;
      custSnap.forEach(c => {
        const ms = c.data().created_at?.toMillis() || 0;
        if (ms >= todayStart.getTime()) todayCount++;
      });
      stores.push(storeData);
    }

    document.getElementById('stat-stores').textContent = stores.length;
    document.getElementById('stat-customers').textContent = totalCustomers;
    document.getElementById('stat-today').textContent = todayCount;

    const tbody = document.getElementById('storesTable');
    if (stores.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888;padding:40px;">등록된 매장이 없습니다.</td></tr>';
    } else {
      tbody.innerHTML = stores.map(s => {
        const qrUrl = window.location.origin + '/?store=' + s.id;
        return `<tr>
          <td><code>${s.id}</code></td>
          <td>${s.name || '-'} <span style="color:#888;">(손님 ${s.customerCount}명)</span></td>
          <td><a href="${qrUrl}" class="qr-link" target="_blank">${qrUrl}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${qrUrl}');this.textContent='복사됨'">복사</button></td>
          <td><a href="/index1.html?store=${s.id}" class="qr-link">관리 →</a></td>
        </tr>`;
      }).join('');
    }
  }

  // 시스템 내부 도메인 (사용자에게 안 보임)
  const INTERNAL_DOMAIN = '@dreammaker.kr';

  // 4자리 숫자 → Firebase 8자리 비번
  function transformPassword(input) {
    if (/^\d{4}$/.test(input)) return 'dm' + input + 'kr';
    return input;
  }

  // ★★ 매장 + 사장님 계정 한 번에 등록 ★★
  document.getElementById('addStoreBtn').addEventListener('click', async () => {
    const storeId = document.getElementById('new-store-id').value.trim();
    const storeName = document.getElementById('new-store-name').value.trim();
    const address = document.getElementById('new-store-address').value.trim();
    const phone = document.getElementById('new-store-phone').value.trim();
    const userId = document.getElementById('new-owner-id').value.trim().toLowerCase();
    const passwordInput = document.getElementById('new-owner-password').value;
    const msg = document.getElementById('addStoreMsg');

    // 입력 검증
    if (!storeId || !storeName || !userId || !passwordInput) {
      msg.style.color = '#ff9999';
      msg.textContent = '매장 ID, 매장 이름, 사장님 아이디, 비밀번호는 필수입니다.';
      return;
    }
    if (!/^[a-zA-Z0-9-]+$/.test(storeId)) {
      msg.style.color = '#ff9999';
      msg.textContent = '매장 ID는 영문/숫자/하이픈만 가능합니다.';
      return;
    }
    if (!/^[a-z0-9_-]{3,}$/.test(userId)) {
      msg.style.color = '#ff9999';
      msg.textContent = '사장님 아이디는 영문 소문자/숫자/언더바/하이픈만 가능 (3자 이상).';
      return;
    }
    if (!/^\d{4}$/.test(passwordInput)) {
      msg.style.color = '#ff9999';
      msg.textContent = '비밀번호는 4자리 숫자로 입력하세요.';
      return;
    }

    try {
      // 1. 매장 ID 중복 체크
      const existing = await getDoc(doc(db, 'stores', storeId));
      if (existing.exists()) {
        msg.style.color = '#ff9999';
        msg.textContent = '이미 사용 중인 매장 ID입니다.';
        return;
      }

      // 2. 매장 등록
      await setDoc(doc(db, 'stores', storeId), {
        name: storeName, address, ownerPhone: phone,
        rouletteUrl: '', created_at: serverTimestamp()
      });

      // 3. 사장님 계정 발급
      const email = userId + INTERNAL_DOMAIN;
      const password = transformPassword(passwordInput);
      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, 'shop_owners', userCred.user.uid), {
        user_id: userId, email, store_id: storeId,
        role: 'owner', created_at: serverTimestamp()
      });

      msg.style.color = '#9eff9e';
      msg.innerHTML = `✅ 등록 완료!<br><br>
        <strong>매장 사장님께 알려드릴 정보:</strong><br>
        ▸ 로그인 주소: <code>${window.location.origin}/login.html</code><br>
        ▸ 아이디: <code>${userId}</code><br>
        ▸ 비밀번호: <code>${passwordInput}</code> (4자리 숫자)<br>
        ▸ 매장 큐알 주소: <code>${window.location.origin}/?store=${storeId}</code><br><br>
        ⚠️ 새 계정으로 자동 로그인되어 슈퍼 관리자 세션이 끊깁니다.<br>
        10초 후 자동 로그아웃 → 다시 슈퍼 관리자(rhj1106@gmail.com)로 로그인하세요.`;

      // 입력칸 초기화
      document.getElementById('new-store-id').value = '';
      document.getElementById('new-store-name').value = '';
      document.getElementById('new-store-address').value = '';
      document.getElementById('new-store-phone').value = '';
      document.getElementById('new-owner-id').value = '';
      document.getElementById('new-owner-password').value = '';

      // 10초 후 자동 로그아웃
      setTimeout(async () => {
        await signOut(auth);
        window.location.href = '/login.html';
      }, 10000);
    } catch (e) {
      let errMsg = '오류: ' + e.message;
      if (e.code === 'auth/email-already-in-use') errMsg = '이미 사용 중인 사장님 아이디입니다. 다른 아이디로 시도해주세요.';
      else if (e.code === 'auth/invalid-email') errMsg = '아이디 형식이 올바르지 않습니다.';
      else if (e.code === 'auth/weak-password') errMsg = '비밀번호 변환 오류 — 4자리 숫자 다시 확인.';
      msg.style.color = '#ff9999';
      msg.textContent = errMsg;
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '/login.html';
  });
</script>

</body>
</html>
