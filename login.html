<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAMMAKER: PARTNER SYSTEM</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .bg-container {
            position: relative; width: 100%; height: 100vh;
            background: url('/bg.jpg') no-repeat center center;
            background-size: contain;
        }
        .login-form-overlay {
            position: absolute; top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            width: 260px; display: flex; flex-direction: column; gap: 12px;
        }
        .overlay-input {
            width: 100%; height: 38px;
            background: transparent; border: none; outline: none;
            color: #fff; padding: 0 10px; font-size: 14px; box-sizing: border-box;
        }
        .login-submit-btn {
            width: 100%; height: 42px;
            background: rgba(0, 229, 255, 0.1);
            border: none; cursor: pointer; margin-top: 5px;
        }
        @media (max-height: 800px) { .login-form-overlay { top: 55.5%; } }
@media (max-width: 600px) { .login-form-overlay { top: 55%; width: 48%; gap: 4px; } }
@media (max-width: 600px) { .login-form-overlay #user_pw { margin-top: -9px !important; margin-left: 3px !important; } }
    </style>
</head>
<body>
    <div class="bg-container">
        <form class="login-form-overlay" id="loginForm">
            <input type="text" id="user_id" class="overlay-input" autocomplete="off" autocapitalize="none">
            <input type="password" id="user_pw" class="overlay-input" style="margin-top: 10px;" inputmode="numeric">
            <button type="submit" id="login_btn" class="login-submit-btn"></button>
        </form>
    </div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const SUPER_ADMIN_WHITELIST = ['rhj1106@gmail.com', 'rhj17321@gmail.com'];
  const INTERNAL_DOMAIN = '@dreammaker.kr';
  const idToEmail = (s) => { const t = s.trim().toLowerCase(); return t.includes('@') ? t : t + INTERNAL_DOMAIN; };
  const transformPwd = (s) => /^\d{4}$/.test(s) ? 'dm' + s + 'kr' : s;

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    if (SUPER_ADMIN_WHITELIST.includes((user.email || '').toLowerCase())) {
      location.href = '/super-admin.html'; return;
    }
    try {
      const d = await getDoc(doc(db, 'shop_owners', user.uid));
      if (d.exists()) {
        const x = d.data();
        if (x.role === 'super_admin') location.href = '/super-admin.html';
        else if (x.store_id) location.href = '/index1.html?store=' + x.store_id;
        else location.href = '/index1.html';
      }
    } catch (e) { console.error(e); }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('user_id').value;
    const pw = document.getElementById('user_pw').value;
    if (!id || !pw) { alert('아이디와 비밀번호를 입력해주세요.'); return; }
    try {
      await signInWithEmailAndPassword(auth, idToEmail(id), transformPwd(pw));
    } catch (err) {
      let m = '로그인 실패';
      if (err.code === 'auth/invalid-credential') m = '아이디 또는 비밀번호가 잘못되었습니다.';
      else if (err.code === 'auth/user-not-found') m = '등록되지 않은 아이디입니다.';
      else if (err.code === 'auth/wrong-password') m = '비밀번호가 틀렸습니다.';
      else if (err.code === 'auth/too-many-requests') m = '시도 횟수 초과 — 잠시 후 다시 시도해주세요.';
      else m = '오류: ' + err.message;
      alert(m);
    }
  });
</script>
</body>
</html>
